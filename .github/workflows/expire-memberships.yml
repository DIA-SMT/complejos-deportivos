name: Expire memberships

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  expire-memberships:
    runs-on: ubuntu-latest
    steps:
      - name: Call cron endpoint
        run: |
          curl --fail --show-error --silent \
            --request GET \
            --header "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            "${{ secrets.CRON_URL }}/api/cron/expire-memberships"
